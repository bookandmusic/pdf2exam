name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: '版本类型 (major=重构/大版本, minor=功能, patch=bug修复)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============ 准备 Tag 信息 ============
  prepare-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.output.outputs.new_tag }}
      version: ${{ steps.output.outputs.version }}
      version_code: ${{ steps.output.outputs.version_code }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate new version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        id: calc_version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          version_type="${{ inputs.version_type }}"

          version="${latest_tag#v}"
          major=$(echo $version | cut -d. -f1)
          minor=$(echo $version | cut -d. -f2)
          patch=$(echo $version | cut -d. -f3)

          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          if [ "$version_type" = "major" ]; then
            major=$((major + 1))
            minor=0
            patch=0
          elif [ "$version_type" = "minor" ]; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          new_tag="v${major}.${minor}.${patch}"
          version="${major}.${minor}.${patch}"
          version_code=$((major * 10000 + minor * 100 + patch))

          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_code=$version_code" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.calc_version.outputs.new_tag }}" -m "Release ${{ steps.calc_version.outputs.new_tag }}"
          git push origin "${{ steps.calc_version.outputs.new_tag }}"

      - name: Parse tag (tag push trigger)
        if: github.event_name == 'push'
        id: parse_tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          major=$(echo $version | cut -d. -f1)
          minor=$(echo $version | cut -d. -f2)
          patch=$(echo $version | cut -d. -f3)
          version_code=$((major * 10000 + minor * 100 + patch))
          echo "new_tag=$tag" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_code=$version_code" >> $GITHUB_OUTPUT

      - name: Output tag info
        id: output
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "new_tag=${{ steps.calc_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ steps.calc_version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "version_code=${{ steps.calc_version.outputs.version_code }}" >> $GITHUB_OUTPUT
          else
            echo "new_tag=${{ steps.parse_tag.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "version=${{ steps.parse_tag.outputs.version }}" >> $GITHUB_OUTPUT
            echo "version_code=${{ steps.parse_tag.outputs.version_code }}" >> $GITHUB_OUTPUT
          fi

  # ============ 桌面构建 ============
  build-desktop:
    needs: prepare-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: exe
            artifact_ext: exe msi
          - platform: macos
            target: universal-apple-darwin
            runner: macos-14
            ext: dmg
            artifact_ext: dmg app.tar.gz
          - platform: linux
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            ext: AppImage
            artifact_ext: AppImage deb

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Update version
        shell: bash
        run: |
          VERSION="${{ needs.prepare-tag.outputs.version }}"
          perl -pi -e "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          perl -pi -e "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          retryAttempts: 3

      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${{ needs.prepare-tag.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          ARTIFACTS_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          mkdir -p release-artifacts

          for ext in ${{ matrix.artifact_ext }}; do
            for file in $(find "$ARTIFACTS_DIR" -name "*.$ext" -type f 2>/dev/null); do
              if [ -n "$file" ]; then
                new_name="PDF2Exam-$VERSION-$PLATFORM.$ext"
                cp "$file" "release-artifacts/$new_name"
                echo "Renamed: $new_name"
              fi
            done
          done

          ls -lh release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build-${{ needs.prepare-tag.outputs.new_tag }}
          path: release-artifacts

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-tag.outputs.new_tag }}
          name: 'PDF2Exam ${{ needs.prepare-tag.outputs.new_tag }}'
          files: release-artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ Android 构建 ============
  build-android:
    needs: prepare-tag
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;26.3.11579264"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Restore Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > $HOME/pdf2exam.keystore
            echo "Keystore restored"
          else
            echo "No keystore secret found, will build unsigned APK"
          fi

      - name: Update version
        run: |
          VERSION="${{ needs.prepare-tag.outputs.version }}"
          VERSION_CODE="${{ needs.prepare-tag.outputs.version_code }}"

          perl -pi -e "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          perl -pi -e "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

          mkdir -p src-tauri/gen/android/app
          echo "tauri.android.versionCode=$VERSION_CODE" > src-tauri/gen/android/app/tauri.properties
          echo "tauri.android.versionName=$VERSION" >> src-tauri/gen/android/app/tauri.properties

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264

      - name: Sign APK
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VERSION="${{ needs.prepare-tag.outputs.version }}"
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort -V | tail -n 1)
          mkdir -p release-artifacts

          if [ -f "$HOME/pdf2exam.keystore" ]; then
            for apk in $(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f); do
              filename=$(basename "$apk")
              if [[ "$filename" == *"universal"* ]]; then
                final_name="PDF2Exam-$VERSION-android.apk"
                echo "Signing $filename -> $final_name"
                $BUILD_TOOLS/zipalign -v 4 "$apk" "${apk%.apk}-aligned.apk"
                $BUILD_TOOLS/apksigner sign \
                  --ks $HOME/pdf2exam.keystore \
                  --ks-pass pass:$KEYSTORE_PASS \
                  --ks-key-alias $KEY_ALIAS \
                  --key-pass pass:$KEY_PASS \
                  --out "release-artifacts/$final_name" \
                  "${apk%.apk}-aligned.apk"
                rm "${apk%.apk}-aligned.apk"
              fi
            done
          else
            for apk in $(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f); do
              filename=$(basename "$apk")
              if [[ "$filename" == *"universal"* ]]; then
                final_name="PDF2Exam-$VERSION-android-unsigned.apk"
                cp "$apk" "release-artifacts/$final_name"
                echo "Copied unsigned: $final_name"
              fi
            done
          fi

          ls -lh release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ needs.prepare-tag.outputs.new_tag }}
          path: release-artifacts

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-tag.outputs.new_tag }}
          name: 'PDF2Exam ${{ needs.prepare-tag.outputs.new_tag }}'
          files: release-artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ 发布 Release ============
  publish-release:
    needs: [prepare-tag, build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-tag.outputs.new_tag }}
          name: 'PDF2Exam ${{ needs.prepare-tag.outputs.new_tag }}'
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}